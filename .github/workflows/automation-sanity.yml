name: Automation Sanity

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  sanity-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run syntax checks
        run: npm run test:syntax

      - name: Run smoke and sanity checks
        run: npm test
