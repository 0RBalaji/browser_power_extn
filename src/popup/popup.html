<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Browser - Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌙 Dark Browser</h1>
      <p class="subtitle">Auto Dark Mode</p>
    </header>

    <main class="scrollable">
      <!-- Status Section -->
      <section class="status-section">
        <div class="toggle-container">
          <label class="toggle-label">
            <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
            <span class="toggle-slider"></span>
          </label>
          <span id="statusText" class="status-text">Dark Mode: ON</span>
        </div>
      </section>

      <!-- Current Site Section -->
      <section class="site-section">
        <h2>Current Site</h2>
        <div class="current-site">
          <span id="currentSite" class="site-name">-</span>
          <button id="excludeBtn" class="btn btn-secondary">Exclude</button>
        </div>
      </section>

      <!-- Settings Section -->
      <section class="settings-section">
        <h2>Settings</h2>
        <div class="theme-card">
          <div id="themeFieldLabel" class="theme-card-label">Theme</div>
          <div class="theme-dropdown" id="themeDropdown">
            <button
              type="button"
              class="theme-dropdown__trigger"
              id="themeDropdownTrigger"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="themeDropdownList"
              aria-labelledby="themeFieldLabel themeDropdownValue"
            >
              <span class="theme-dropdown__value" id="themeDropdownValue">Default</span>
              <span class="theme-dropdown__chevron" aria-hidden="true"></span>
            </button>
            <div class="theme-dropdown__panel" id="themeDropdownPanel" hidden>
              <ul
                class="theme-dropdown__list scrollable scrollable--compact"
                id="themeDropdownList"
                role="listbox"
                aria-labelledby="themeFieldLabel"
                tabindex="-1"
              >
                <li role="option" class="theme-dropdown__option" data-value="default" tabindex="-1">Default</li>
                <li role="option" class="theme-dropdown__option" data-value="amoled" tabindex="-1">AMOLED</li>
                <li role="option" class="theme-dropdown__option" data-value="blue" tabindex="-1">Blue</li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <!-- Info Section -->
      <section class="info-section">
        <p>Dark Browser automatically converts white backgrounds to dark mode while preserving images, videos, and embedded content.</p>
      </section>
    </main>

    <footer>
      <a id="footerGithub" href="https://github.com/0RBalaji/browser_power_extn" target="_blank" rel="noopener noreferrer">GitHub</a>
      <span id="footerVersion" class="version" aria-live="polite"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
